<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শিক্ষকবৃন্দ | পুরানঘাট মহাবিদ্যালয়</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            text-align: center;
        }

        h1 {
            color: #004d40;
            margin-bottom: 40px;
            border-bottom: 3px solid #ff9800;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* কার্ডের গ্রিড লেআউট */
        .teacher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        /* প্রোফাইল কার্ড স্টাইল */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            border-bottom: 5px solid #004d40;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #e0e0e0;
        }

        .info {
            padding: 20px;
        }

        .info h2 {
            font-size: 20px;
            color: #333;
            margin: 10px 0 5px;
        }

        .info p {
            color: #666;
            font-size: 15px;
            margin: 5px 0;
        }

        .designation {
            font-weight: bold;
            color: #00796b;
        }

        .subject {
            color: #ff9800 !important;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>আমাদের দক্ষ শিক্ষকবৃন্দ</h1>

    <div class="teacher-grid">
        
        <div class="card">
            <img src="https://puranghatcollege.github.io/puranghatcollege/Tna.png" alt="Nahid Sultana">
            <div class="info">
                <h2>Nahid Sultana</h2>
                <p class="designation">অধ্যক্ষ</p>
                <p class="subject">পুরানঘাট মহাবিদ্যালয়</p>
            </div>
        </div>
<div class="card">
            <img src="https://puranghatcollege.github.io/puranghatcollege/Tas.png" alt="Shuvo Alam">
            <div class="info">
                <h2>Ashraful Islam Akash</h2>
                <p class="designation">প্রভাষক</p>
                <p class="subject">Political Science</p>
            </div>
        </div>
        <div class="card">
            <img src="https://puranghatcollege.github.io/puranghatcollege/Fp.png" alt="Firuja Akter">
            <div class="info">
                <h2>Firuja Akter</h2>
                <p class="designation">বিভাগীয় প্রধান</p>
                <p class="subject"> জীববিজ্ঞান বিভাগ /p>
            </div>
        </div>

        <div class="card">
            <img src="https://puranghatcollege.github.io/puranghatcollege/Sp.jpg" alt="Shuvo Alam">
            <div class="info">
                <h2>Shuvo Alam</h2>
                <p class="designation">প্রভাষক</p>
                <p class="subject">আইসিটি (ICT)</p>
            </div>
        </div>
        </div>
    </div>

</body>
</html>
