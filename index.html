    <style>
        :root { --primary: #004d40; --secondary: #ff9800; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* Fixed Header with Logo (Center Alignment) */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 70px 20px; /* প্যাডিং একটু বাড়িয়ে দেওয়া হয়েছে লোগোর জন্য */
            text-align: center; 
            border-bottom: 6px solid var(--secondary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        /* কলেজের লোগো স্টাইল */
        .college-logo {
            width: 130px; /* লোগোর সাইজ */
            height: 130px;
            border-radius: 50%; /* গোল করার জন্য */
            border: 4px solid #fff;
            background: #fff;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 15px; /* লোগো এবং নামের মাঝে দূরত্ব */
            position: absolute;
            top: 0px; /* লোগোকে হেডারের অর্ধেক উপরে তুলতে */
            left: 50%;
            transform: translateX(-50%);
        }

        .header-content { margin-top: 60px; /* লোগোর জন্য জায়গা ছেড়ে দেওয়া */ }
        .header h1 { margin: 0; font-size: clamp(26px, 8vw, 44px); font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .header p { margin: 10px 0 0; font-size: 16px; opacity: 0.9; font-weight: 300; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 15px; }
        
        .form-card { 
            background: var(--white); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            border: 1px solid #e0e0e0;
        }

        h2 { 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 35px; 
            font-size: 22px; 
            border-bottom: 2px solid #f0f0f0; 
            padding-bottom: 15px;
            text-transform: uppercase;
        }

        /* Responsive Grid Layout */
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 20px; }
        @media (max-width: 650px) { .row { grid-template-columns: 1fr; } }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: 700; color: #444; font-size: 14px; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e1e4e8; 
            border-radius: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
            outline: none;
            color: #333;
        }
        
        input:focus, select:focus { border-color: var(--secondary); box-shadow: 0 0 8px rgba(255,152,0,0.15); }

        /* Submit Button */
        .btn-container { text-align: center; margin-top: 35px; }
        .btn { 
            background: var(--secondary); 
            color: white; 
            padding: 18px 60px; 
            border: none; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.4s; 
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(255,152,0,0.3);
        }
        .btn:hover { background: #e68a00; transform: translateY(-3px); box-shadow: 0 12px 20px rgba(255,152,0,0.4); }

        .footer { text-align: center; padding: 50px; color: #777; font-size: 14px; }

@media print {

    body * { visibility: hidden; }
    /* শুধু প্রিন্ট এরিয়া এবং তার ভেতরের সব দেখাও */
    #printArea, #printArea * { visibility: visible; }
    /* প্রিন্ট এরিয়াকে একদম উপরে এবং ফুল স্ক্রিনে নিয়ে আসো */
    #printArea { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100%; 
        border: none; 
        padding: 0; 
        margin: 0;
    }

    .no-print { display: none !important; }
}

    function submitApplication() {
        const form = document.getElementById('admissionForm');
        
        // ১. ফরমের ভ্যালিডেশন চেক (এটি নিশ্চিত করবে সব ঘর পূরণ হয়েছে কি না)
        if(!form.checkValidity()) { 
            form.reportValidity(); // এটি কোন ঘরটি খালি তা ইউজারকে দেখিয়ে দিবে
            return; 
        }

        const photoFile = document.getElementById('photo').files[0];
        
        if (photoFile) {
            // ২. ছবির সাইজ চেক (২ এমবি এর বেশি হলে সতর্ক করবে)
            if(photoFile.size > 2 * 1024 * 1024) {
                alert("ছবি অনেক বড়! দয়া করে ২ এমবি এর নিচের ছবি আপলোড করুন।");
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(photoFile); // আগে রিড শুরু করা ভালো

            reader.onloadend = function() {
                const formData = {
                    student_name: document.getElementById('sname').value,
                    mobile: document.getElementById('mobile').value,
                    father_name: document.getElementById('fname').value,
                    mother_name: document.getElementById('mname').value,
                    dob: document.getElementById('dob').value,
                    email: document.getElementById('email').value,
                    ssc_roll: document.getElementById('roll').value,
                    ssc_reg: document.getElementById('reg').value,
                    board: document.getElementById('board').value,
                    passing_year: document.getElementById('passYear').value,
                    ssc_gpa: document.getElementById('gpa').value,
                    blood_group: document.getElementById('bloodGroup').value,
                    group: document.getElementById('group').value,
                    district: document.getElementById('district').value,
                    fourth_subject: document.getElementById('fourthSubject').value,
                    student_photo: reader.result, 
                    submitted_at: new Date().toLocaleString()
                };

                // Firebase-এ ডাটা সেভ করা
                db.ref('admissions/' + formData.ssc_roll).set(formData)
                .then(() => {
                    // অভিনন্দন মেসেজ
                    document.querySelector('.container').innerHTML = `
                        <div class="form-card" id="printArea" style="text-align: center;">
                            <h2 style="color: green; border:none;">আবেদন সফল হয়েছে!</h2>
                            <p>পুরানঘাট কলেজ অনলাইন ভর্তি পোর্টাল - ২০২৬</p>
                            <hr>
                            <div style="text-align: left; display: inline-block; width: 100%; max-width: 400px; line-height: 2;">
                                <p><b>শিক্ষার্থীর নাম:</b> ${formData.student_name}</p>
                                <p><b>রোল নম্বর:</b> ${formData.ssc_roll}</p>
                                <p><b>মোবাইল:</b> ${formData.mobile}</p>
                                <p><b>গ্রুপ:</b> ${formData.group}</p>
                                <p><b>রক্তের গ্রুপ:</b> ${formData.blood_group}</p>
                            </div>
                            <hr>
                            <div class="no-print">
                                <button onclick="window.print()" class="btn" style="padding: 12px 30px; font-size: 16px;">Print / Save as PDF</button>
                                <button onclick="window.location.reload()" class="btn" style="background:#777; padding: 12px 30px; font-size: 16px; margin-top: 10px;">নতুন আবেদন</button>
                            </div>
                        </div>
                    `;
                    window.scrollTo(0,0);
                })
                .catch((error) => {
                    alert("Firebase Error: " + error.message);
                });
            };
        } else {
            alert("অনুগ্রহ করে একটি ছবি আপলোড করুন।");
        }
    }
</script>
